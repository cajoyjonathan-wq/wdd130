<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styled Fieldset Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 300px;
    }

    /* Target the fieldset element */
    /* fieldset {
      border: 2px solid #3498db;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding: 20px;
      margin: 0;
    } */

    /* Target the legend element inside the fieldset */
    /* legend {
      padding: 0 10px;
      font-weight: bold;
      color: #3498db;
    } */

    /* Quick styling for the inputs inside the fieldset */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    input[type="text"], input[type="email"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>

  <form>
    <fieldset>
      <legend>Personal Information</legend>
      
      <div class="input-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="John Doe">
      </div>

      <div class="input-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="john@example.com">
      </div>

      <button type="submit">Submit</button>
    </fieldset>
  </form>

</body>
</html>
