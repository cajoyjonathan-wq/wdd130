<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Exercise</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>
    <form>
        <fieldset>
            <legend>Contact Information</legend>

            <div class="form-item column2">
                <label for="fullname">User's Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-item column2">  
                <label for="useremail">Email Address:</label>
                <input type="email" id="useremail" name="useremail" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Questions</legend>
            <div class="form-item column1">
                <label for="browser">What is your Favorite Internet Browser?</label>
                <select name="browser" id="browser">
                    <option value="chrome">Chrome</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="brave">Brave</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-item column1">
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">
            </div>

            <div class="form-item column3">
                <label for="feedback">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Pagadian City, Philippines"></textarea>
            </div>

        </fieldset>
            <div class="button">    
            <button type="submit">Submit Poll</button>
            </div>
    </form>
</body>
<footer>©️2026 | HTML Form - User Poll Activity | Jonathan Cajoy</footer>
