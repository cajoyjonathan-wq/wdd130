<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting Company. Contact Us Page</title>
    <meta name="description" content="The Contact Page of the White Water Rafting Site. This page
    features the Contact Information of the site and asks the user for their Contact Information as well.">
    <meta name="author" content="Jonathan Cajoy">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo_final.jpg" alt="A Rafting Boat with Oars and a tag named 'RAPIDS'.">
        <nav class="navigation">
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact_title">
        <ul class="info">
            <li>White Water Rafting Company</li>
        </ul> 
        <ul class="contact_info">
            <li>123 Main River Street</li>
            <li>Kolob, California</li>
            <li>+1 999 999 9999</li>
            <li>info@whitewater.com</li>
        </ul>
        </div>
        <div class="middle">
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1636.660081767843!2d122.66158147710752!3d7.822757622921413!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2sph!4v1780917622187!5m2!1sen!2sph" width="450" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="form">
                <form>
                    <div class="quiz-item box">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Name">
                    </div>
                    
                    <div class="quiz-item box">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Email">
                    </div>

                    <div class="checklist-group">
                        <div class="group-label">
                            <label>Message</label>
                            <label>Purpose</label>
                        </div>
                        <!-- <div class="group-label">Purpose</div> -->
                        <div class="choices">
                            <label><input type="radio"> General Inquiry</label>
                            <label><input type="radio"> Reservation Question</label>
                            <label><input type="radio"> Website Suggestion</label>
                        </div>
                    </div>

                    <div class="comment">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5"></textarea>
                    </div>

                    <div class="subscription">
                        <input type="checkbox">
                        <label for="subscription">Please Subscribe me to the monthly newsletter</label>
                    </div>

                    <button type="submit">Get in Touch!</button>

                </form>
            </div>
        </div>
        <section class="employee">
            <div class="employee-heading">
                <li>We are Here to Serve You!</li>
            </div>
            
            <div class="employee-figure">
                <figure>
                    <img src="images/safety.jpg" alt="Man in a Rafting Boat">
                    <figcaption>Safety Officer</figcaption>
                </figure>
                <figure>
                    <img src="images/ceo.jpg" alt="Man in an Office">
                    <figcaption>Chief Executive Officer</figcaption>
                </figure>
                <figure>
                    <img src="images/logistics-2.jpg" alt="Guy with a Construction Hat">
                    <figcaption>Logistics Officer</figcaption>
                </figure>
            
            </div>
        </section>
    </main>
    <footer>
        <p>©️ 2026, White Water Rafting Company, Jonathan Cajoy</p>
        <nav class="socialmedia">
            <a href="htpps://facebook.com">
                <img src="images/facebook.png" alt="Blue Facebook icon">
            </a>
            <a href="htpps://instagram.com">
                <img src="images/instagram1.png" alt="Instagram Icon">
            </a>
            <a href="htpps://tiktok.com">
                <img src="images/tictok.png" alt="Tiktok Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
